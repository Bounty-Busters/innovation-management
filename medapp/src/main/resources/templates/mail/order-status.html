<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f5; padding: 20px; }
        .card { background-color: #fff; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { text-align: center; color: #7B2CBF; margin-bottom: 20px; }
        .footer { font-size: 12px; color: #888; text-align: center; margin-top: 30px; }
        .order-id { font-weight: bold; color: #333; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="header">MedFinder Order Update</h2>
        <p>Hello <span th:text="${order.client.firstName}">User</span>,</p>
        <p th:text="${notificationMessage}">Your order status has changed.</p>
        
        <hr>
        
        <p><strong>Order Number:</strong> <span class="order-id" th:text="${order.orderNumber}">ORD-1234</span></p>
        <p><strong>Total Price:</strong> <span th:text="${order.totalPrice}">0.00</span> RON</p>
        <p><strong>Pickup Location:</strong> <span th:text="${order.pickupLocation.name}">Pharmacy</span></p>
        <p><strong>Address:</strong> <span th:text="${order.pickupLocation.address}">Pharmacy Address</span></p>
        
        <div class="footer">
            <p>Thank you for using MedFinder Click & Collect!</p>
            <p>You can view your order details in your MedFinder account.</p>
        </div>
    </div>
</body>
</html>
