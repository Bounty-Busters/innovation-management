<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFinder Admin Panel</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Admin CSS -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <div class="container-fluid">
        <div class="row">
            
            <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2" layout:fragment="page-title">Page Title</h1>
                    <div class="btn-toolbar mb-2 mb-md-0" layout:fragment="page-actions">
                        <!-- Actions like "Add New" will go here -->
                    </div>
                </div>

                <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

                <!-- Dynamic Content goes here -->
                <div layout:fragment="content"></div>

            </main>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (with Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Admin JS -->
    <script th:src="@{/js/admin.js}"></script>
    
    <!-- For page-specific scripts -->
    <th:block layout:fragment="scripts"></th:block>

</body>
</html>
