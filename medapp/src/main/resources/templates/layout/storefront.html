<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFinder</title>

    <!-- Google Fonts: Outfit for Display, Inter for Body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Custom Storefront CSS -->
    <link rel="stylesheet" th:href="@{/css/storefront.css}">
</head>
<body>

    <!-- Sticky Top Navigation / Searchbar -->
    <header class="mf-header">
        <div class="mf-container">
            <div class="mf-nav-inner">
                <a href="/" class="mf-logo">Med<span>Finder</span></a>
                
                <div class="mf-search-wrapper">
                    <i class="bi bi-search mf-search-icon"></i>
                    <input type="text" id="global-search" class="mf-search-input" placeholder="Search medications, EAN, or active ingredients...">
                </div>

                <div class="mf-nav-actions">
                    <a href="/login" class="mf-btn mf-btn-outline">Sign In</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main layout:fragment="content">
        <!-- Page specific content will go here -->
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom Scripts -->
    <th:block layout:fragment="scripts"></th:block>

</body>
</html>
