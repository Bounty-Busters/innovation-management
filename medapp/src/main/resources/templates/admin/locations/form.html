<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>Location Form</title>
</head>
<body>

<div layout:fragment="page-title" th:text="${locationForm.id == null ? 'Add New Location' : 'Edit Location'}">
    Location Form
</div>

<div layout:fragment="page-actions">
    <a th:href="@{/admin/locations}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to List
    </a>
</div>

<div layout:fragment="content">
    <div class="row">
        <div class="col-lg-10">
            <form th:action="${locationForm.id == null ? '/admin/locations' : '/admin/locations/' + locationForm.id}"
                  method="post" th:object="${locationForm}">

                <!-- Basic Info -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white">
                        <h6 class="mb-0"><i class="bi bi-info-circle me-1"></i> Location Details</h6>
                    </div>
                    <div class="card-body">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="pharmacyId" class="form-label">Pharmacy *</label>
                                <select class="form-select" th:field="*{pharmacyId}" th:classappend="${#fields.hasErrors('pharmacyId')} ? 'is-invalid'">
                                    <option value="">Select pharmacy...</option>
                                    <option th:each="p : ${pharmacies}" th:value="${p.id}" th:text="${p.name}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('pharmacyId')}" th:errors="*{pharmacyId}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="name" class="form-label">Location Name</label>
                                <input type="text" class="form-control" th:field="*{name}" placeholder="e.g. Sucursala Unirii">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label">Address *</label>
                            <input type="text" class="form-control" th:field="*{address}" th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="city" class="form-label">City *</label>
                                <input type="text" class="form-control" th:field="*{city}" th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                            </div>
                            <div class="col-md-4">
                                <label for="county" class="form-label">County *</label>
                                <input type="text" class="form-control" th:field="*{county}" th:classappend="${#fields.hasErrors('county')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('county')}" th:errors="*{county}"></div>
                            </div>
                            <div class="col-md-4">
                                <label for="postalCode" class="form-label">Postal Code</label>
                                <input type="text" class="form-control" th:field="*{postalCode}">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="latitude" class="form-label">Latitude</label>
                                <input type="number" step="0.000001" class="form-control" th:field="*{latitude}">
                            </div>
                            <div class="col-md-4">
                                <label for="longitude" class="form-label">Longitude</label>
                                <input type="number" step="0.000001" class="form-control" th:field="*{longitude}">
                            </div>
                            <div class="col-md-4">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="text" class="form-control" th:field="*{phone}">
                            </div>
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeCheck">
                            <label class="form-check-label" for="activeCheck">Active</label>
                        </div>
                    </div>
                </div>

                <!-- Working Hours -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white">
                        <h6 class="mb-0"><i class="bi bi-clock me-1"></i> Working Hours</h6>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Day</th>
                                        <th>Open</th>
                                        <th>Close</th>
                                        <th>Closed</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="wh, stat : ${locationForm.workingHours}">
                                        <td>
                                            <input type="hidden" th:field="*{workingHours[__${stat.index}__].dayOfWeek}">
                                            <span th:text="${locationForm.workingHours[__${stat.index}__].dayOfWeek}">MONDAY</span>
                                        </td>
                                        <td>
                                            <input type="time" class="form-control form-control-sm"
                                                   th:field="*{workingHours[__${stat.index}__].openTime}" style="max-width:150px;">
                                        </td>
                                        <td>
                                            <input type="time" class="form-control form-control-sm"
                                                   th:field="*{workingHours[__${stat.index}__].closeTime}" style="max-width:150px;">
                                        </td>
                                        <td>
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox"
                                                       th:field="*{workingHours[__${stat.index}__].closed}">
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mb-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Save Location
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
