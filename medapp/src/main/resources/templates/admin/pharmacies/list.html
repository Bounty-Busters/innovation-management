<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>Pharmacies</title>
</head>
<body>

<div layout:fragment="page-title">Pharmacies Management</div>

<div layout:fragment="page-actions">
    <a sec:authorize="hasAnyAuthority('SUPER_USER','PHARM_OWNER')" th:href="@{/admin/pharmacies/new}" class="btn btn-sm btn-primary">
        <i class="bi bi-plus-circle"></i> Add New
    </a>
</div>

<div layout:fragment="content">

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>CUI</th>
                            <th>Owner</th>
                            <th>Nr. Locations</th>
                            <th>Sync</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${pharmacyPage.content}">
                            <td class="fw-bold" th:text="${p.name}">Catena</td>
                            <td th:text="${p.cui ?: '—'}">RO123</td>
                            <td th:text="${p.owner != null ? p.owner.firstName + ' ' + p.owner.lastName : '—'}">Owner</td>
                            <td th:text="${p.locations != null ? p.locations.size() : 0}">0</td>
                            <td>
                                <span th:if="${p.syncEnabled}" class="badge bg-success">Enabled</span>
                                <span th:unless="${p.syncEnabled}" class="badge bg-secondary">Disabled</span>
                            </td>
                            <td>
                                <span th:if="${p.active}" class="badge bg-success">Active</span>
                                <span th:unless="${p.active}" class="badge bg-danger">Inactive</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/admin/pharmacies/{id}(id=${p.id})}" class="btn btn-sm btn-outline-info" title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/admin/pharmacies/{id}/edit(id=${p.id})}" class="btn btn-sm btn-outline-primary" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/pharmacies/{id}/toggle(id=${p.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm" th:classappend="${p.active ? 'btn-outline-warning' : 'btn-outline-success'}"
                                            th:title="${p.active ? 'Deactivate' : 'Activate'}">
                                        <i class="bi" th:classappend="${p.active ? 'bi-pause-circle' : 'bi-play-circle'}"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${pharmacyPage.empty}">
                            <td colspan="7" class="text-center py-4 text-muted">No pharmacies found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <th:block th:replace="~{fragments/pagination :: pagination(pageData=${pharmacyPage})}"></th:block>
    </div>
</div>

</body>
</html>
