<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>Clients</title>
</head>
<body>

<div layout:fragment="page-title">Clients</div>

<div layout:fragment="content">

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>City</th>
                            <th>Nr. Orders</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${clientPage.content}">
                            <td class="fw-bold" th:text="${c.firstName + ' ' + c.lastName}">Name</td>
                            <td th:text="${c.email}">email</td>
                            <td th:text="${c.phone ?: '—'}">phone</td>
                            <td th:text="${c.city ?: '—'}">city</td>
                            <td th:text="${c.orders != null ? c.orders.size() : 0}">0</td>
                            <td>
                                <span th:if="${c.enabled}" class="badge bg-success">Active</span>
                                <span th:unless="${c.enabled}" class="badge bg-danger">Inactive</span>
                            </td>
                            <td class="text-end">
                                <form th:action="@{/admin/users/{id}/toggle(id=${c.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm"
                                            th:classappend="${c.enabled ? 'btn-outline-warning' : 'btn-outline-success'}"
                                            th:title="${c.enabled ? 'Disable' : 'Enable'}">
                                        <i class="bi" th:classappend="${c.enabled ? 'bi-person-x' : 'bi-person-check'}"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${clientPage.empty}">
                            <td colspan="7" class="text-center py-4 text-muted">No clients found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <th:block th:replace="~{fragments/pagination :: pagination(pageData=${clientPage})}"></th:block>
    </div>
</div>

</body>
</html>
