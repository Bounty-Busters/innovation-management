<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>403 - Access Denied</title>
</head>
<body>

<div layout:fragment="page-title" class="d-none"></div>
<div layout:fragment="page-actions" class="d-none"></div>

<div layout:fragment="content" class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 fw-bold text-danger"><i class="bi bi-shield-lock"></i></h1>
            <h2 class="mb-4">403 - Access Denied</h2>
            <p class="lead text-muted mb-4">You do not have the required permissions to view this page or perform this action.</p>
            <a th:href="@{/admin/dashboard}" class="btn btn-primary px-4 py-2">
                <i class="bi bi-house-door me-2"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>

</body>
</html>
