<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>404 - Not Found</title>
</head>
<body>

<div layout:fragment="page-title" class="d-none"></div>
<div layout:fragment="page-actions" class="d-none"></div>

<div layout:fragment="content" class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 fw-bold text-warning"><i class="bi bi-file-earmark-x"></i></h1>
            <h2 class="mb-4">404 - Page Not Found</h2>
            <p class="lead text-muted mb-4">The page you are looking for does not exist or has been moved.</p>
            <a sec:authorize="isAuthenticated() and !hasAnyAuthority('CLIENT')" th:href="@{/admin/dashboard}" class="btn btn-primary px-4 py-2">
                <i class="bi bi-house-door me-2"></i> Return to Dashboard
            </a>
            <a sec:authorize="isAnonymous() or hasAnyAuthority('CLIENT')" th:href="@{/}" class="btn btn-primary px-4 py-2">
                <i class="bi bi-house-door me-2"></i> Return to Home
            </a>
        </div>
    </div>
</div>

</body>
</html>
