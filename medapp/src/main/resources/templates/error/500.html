<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>500 - Server Error</title>
</head>
<body>

<div layout:fragment="page-title" class="d-none"></div>
<div layout:fragment="page-actions" class="d-none"></div>

<div layout:fragment="content" class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 fw-bold text-danger"><i class="bi bi-exclamation-octagon"></i></h1>
            <h2 class="mb-4">500 - Internal Server Error</h2>
            <p class="lead text-muted mb-4">Oops! Something went wrong on our end. Please try again later or contact support if the issue persists.</p>
            
            <div class="text-start mt-4 d-none" id="errorDetails">
                <div class="alert alert-secondary">
                    <pre class="mb-0 text-dark small" th:text="${message}"></pre>
                </div>
            </div>

            <button type="button" class="btn btn-outline-secondary px-4 py-2 me-2" onclick="document.getElementById('errorDetails').classList.toggle('d-none')">
                <i class="bi bi-bug me-2"></i> Toggle Details
            </button>
            <a th:href="@{/admin/dashboard}" class="btn btn-primary px-4 py-2">
                <i class="bi bi-house-door me-2"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>

</body>
</html>
