<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/storefront}">
<head>
    <title th:text="${medication.name} + ' - MedFinder'">MedFinder PDP</title>
</head>
<body>

<main layout:fragment="content" class="mf-container">
    
    <div class="mf-pdp-header">
        <div>
            <span class="mf-ean-badge" th:text="'EAN: ' + ${medication.ean}">EAN: 12345678</span>
            <h1 class="mf-pdp-title" th:text="${medication.name}">Medication Name</h1>
            <p class="mf-pdp-desc" th:text="${medication.activeSubstance} + ' • ' + ${medication.dosage} + ' • ' + ${medication.form}">Details</p>
        </div>
        <div th:if="${medication.prescriptionRequired}" style="color: var(--clr-secondary); font-weight: 500; display:flex; align-items:center; gap:8px;">
            <i class="bi bi-exclamation-circle-fill"></i> Prescription Required
        </div>
    </div>

    <div class="mf-col-2">
        <!-- Left: Price Comparison List -->
        <div class="mf-price-list">
            <h2 class="mf-section-title" style="font-size: 24px;">Available at</h2>
            
            <div th:if="${#lists.isEmpty(stocks)}" class="mf-glass-card">
                Out of stock everywhere nearby.
            </div>

            <!-- Sort stocks by price using Thymeleaf stream/sort (assuming they are pre-sorted or we sort here, let's assume controller didn't sort, we can sort them via CSS flex order or let JS handle, actually standard Thymeleaf lacks easy sort, but we can iterate as is. The requirement said "sorted list of prices". We should have sorted it in the controller, but we can do it here via a utility or we just iterate.) -->
            <!-- We'll assume the controller returns them as is, but we will sort them using JS or modify controller later. For now, just render them. -->
            
            <div th:each="stock : ${stocks}" class="mf-glass-card mf-price-row" th:id="'stock-row-' + ${stock.id}" th:attr="data-price=${stock.price}, data-location-id=${stock.location.id}">
                <div class="mf-pharmacy-info">
                    <div class="mf-pharmacy-logo" th:text="${#strings.substring(stock.location.pharmacyName, 0, 1)}">P</div>
                    <div class="mf-pharmacy-details">
                        <h3 th:text="${stock.location.pharmacyName}">Pharmacy Name</h3>
                        <p>
                            <i class="bi bi-geo-alt"></i> <span th:text="${stock.location.address} + ', ' + ${stock.location.city}">Address</span>
                        </p>
                        <div class="mf-stock-badge mf-stock-in" th:text="'In Stock: ' + ${stock.quantity}">In Stock: 5</div>
                    </div>
                </div>
                <div class="mf-price-action">
                    <div class="mf-price-big" th:text="${stock.price} + ' RON'">15 RON</div>
                    <!-- Click & Collect Reservation Trigger -->
                    <button class="mf-btn mf-btn-primary" 
                            th:onclick="'reserve(' + ${stock.location.id} + ', ' + ${medication.id} + ', ' + ${stock.price} + ')'">
                        Reserve <i class="bi bi-arrow-right-short"></i>
                    </button>
                </div>
            </div>
            
        </div>

        <!-- Right: Map -->
        <div id="pdp-map" class="mf-pdp-map mf-glass-card" style="padding:0; border:1px solid var(--clr-border);"></div>
    </div>

    <!-- Reservation Modal -->
    <div class="modal fade" id="reservationModal" tabindex="-1" aria-labelledby="reservationModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content mf-glass-card border-0" style="background: rgba(36, 40, 59, 0.95); color: var(--clr-text);">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title" id="reservationModalLabel" style="color: #fff;"><i class="bi bi-clock-history"></i> Reserve Medication</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="reservationForm">
                        <input type="hidden" id="resLocationId">
                        <input type="hidden" id="resMedicationId">
                        
                        <div class="mb-3">
                            <label for="resQuantity" class="form-label" style="color: var(--clr-text-muted);">How many units?</label>
                            <input type="number" class="form-control" id="resQuantity" value="1" min="1" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--clr-border); color: #fff;">
                        </div>
                        <div class="mb-3">
                            <label for="resHours" class="form-label" style="color: var(--clr-text-muted);">Duration (Hours)</label>
                            <input type="number" class="form-control" id="resHours" value="2" min="1" max="24" required style="background: rgba(0,0,0,0.2); border: 1px solid var(--clr-border); color: #fff;">
                            <small class="text-muted mt-1 d-block"><i class="bi bi-info-circle"></i> 0-2h is free, 3-24h applies a holding fee.</small>
                        </div>
                    </form>
                    
                    <div id="resAlert" class="alert d-none mt-3" role="alert"></div>
                </div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn mf-btn-primary" id="confirmResBtn" onclick="submitReservation()">Confirm Reservation</button>
                </div>
            </div>
        </div>
    </div>

</main>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        /*<![CDATA[*/
        const stocks = /*[[${stocks}]]*/ [];
        /*]]>*/

        let resModal;

        document.addEventListener("DOMContentLoaded", function() {
            resModal = new bootstrap.Modal(document.getElementById('reservationModal'));

            // 1. Sort rows by price
            const list = document.querySelector('.mf-price-list');
            const rows = Array.from(list.querySelectorAll('.mf-price-row'));
            rows.sort((a, b) => parseFloat(a.dataset.price) - parseFloat(b.dataset.price));
            rows.forEach(row => list.appendChild(row));

            // 2. Initialize Map
            if (stocks.length > 0) {
                // Focus on first stock location
                let firstLat = 44.4268;
                let firstLng = 26.1025;
                
                // Find first valid coordinate
                for(let s of stocks) {
                    if(s.location.latitude && s.location.longitude) {
                        firstLat = s.location.latitude;
                        firstLng = s.location.longitude;
                        break;
                    }
                }

                const map = L.map('pdp-map', { zoomControl: true }).setView([firstLat, firstLng], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19,
                    attribution: '© OSM, © CartoDB'
                }).addTo(map);

                const pharmaIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style='background-color:#00F0FF;width:16px;height:16px;border-radius:50%;border:2px solid #0A0A0B;box-shadow:0 0 15px rgba(0,240,255,0.8); transition: all 0.3s ease;'></div>`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });

                const pharmaIconHover = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style='background-color:#FF007A;width:24px;height:24px;border-radius:50%;border:2px solid #0A0A0B;box-shadow:0 0 25px rgba(255,0,122,1); transition: all 0.3s ease;'></div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const markersByLocation = {};

                // Add markers
                stocks.forEach(s => {
                    if(s.location.latitude && s.location.longitude) {
                        const marker = L.marker([s.location.latitude, s.location.longitude], {icon: pharmaIcon})
                         .addTo(map)
                         .bindPopup(`<b>${s.location.pharmacyName}</b><br>${s.price} RON`);
                         
                        markersByLocation[s.location.id] = marker;
                    }
                });
                
                // Add hover effect to rows
                rows.forEach(row => {
                    const locId = row.dataset.locationId;
                    row.addEventListener('mouseenter', () => {
                        if (markersByLocation[locId]) {
                            markersByLocation[locId].setIcon(pharmaIconHover);
                            markersByLocation[locId].setZIndexOffset(1000);
                        }
                    });
                    row.addEventListener('mouseleave', () => {
                        if (markersByLocation[locId]) {
                            markersByLocation[locId].setIcon(pharmaIcon);
                            markersByLocation[locId].setZIndexOffset(0);
                        }
                    });
                });
            }
        });

        // Click & Collect Logic
        function reserve(locationId, medicationId, price) {
            document.getElementById('resLocationId').value = locationId;
            document.getElementById('resMedicationId').value = medicationId;
            document.getElementById('resQuantity').value = "1";
            document.getElementById('resHours').value = "2";
            
            const alertDiv = document.getElementById('resAlert');
            alertDiv.className = 'alert d-none mt-3';
            alertDiv.innerHTML = '';
            
            document.getElementById('confirmResBtn').style.display = 'block';
            document.getElementById('reservationForm').style.display = 'block';
            resModal.show();
        }

        function submitReservation() {
            const locationId = document.getElementById('resLocationId').value;
            const medicationId = document.getElementById('resMedicationId').value;
            const quantity = document.getElementById('resQuantity').value;
            const hours = document.getElementById('resHours').value;
            const alertDiv = document.getElementById('resAlert');
            
            if (!quantity || quantity <= 0 || !hours || hours <= 0 || hours > 24) {
                alertDiv.className = 'alert alert-warning mt-3';
                alertDiv.innerHTML = 'Please enter valid inputs (Quantity > 0, Hours 1-24).';
                return;
            }

            const formData = new FormData();
            formData.append('locationId', locationId);
            formData.append('medicationId', medicationId);
            formData.append('quantity', quantity);
            formData.append('hours', hours);

            const btn = document.getElementById('confirmResBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Reserving...';

            fetch('/api/reserve', {
                method: 'POST',
                body: formData
            })
            .then(async response => {
                btn.disabled = false;
                btn.innerHTML = 'Confirm Reservation';
                
                if (response.ok) {
                    const order = await response.json();
                    
                    btn.style.display = 'none';
                    document.getElementById('reservationForm').style.display = 'none';
                    
                    const expiresStr = order.expiresAt ? new Date(order.expiresAt).toLocaleString() : 'N/A';
                    
                    alertDiv.className = 'alert alert-success mt-3';
                    alertDiv.innerHTML = `<strong>Reservation successful!</strong><br>
                                          Order #: <b>${order.orderNumber}</b><br>
                                          Total to pay at pharmacy: <b>${order.totalPrice} RON</b><br>
                                          (Holding fee: ${order.holdingFee} RON)<br><br>
                                          <i class="bi bi-stopwatch"></i> Reserved until: <b>${expiresStr}</b>`;
                                          
                    setTimeout(() => window.location.reload(), 3000);
                } else {
                    const err = await response.text();
                    alertDiv.className = 'alert alert-danger mt-3';
                    alertDiv.innerHTML = "<strong>Failed to reserve:</strong> " + err;
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerHTML = 'Confirm Reservation';
                
                console.error("Error:", error);
                alertDiv.className = 'alert alert-danger mt-3';
                alertDiv.innerHTML = "An error occurred during reservation.";
            });
        }
    </script>
</th:block>

</body>
</html>
