<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/storefront}">
<head>
    <title>MedFinder - Find Medications Near You</title>
</head>
<body>

<main layout:fragment="content">
    
    <!-- Hero / Map -->
    <section class="mf-home-hero">
        <div id="home-map" class="mf-map-container"></div>
        <div class="mf-hero-overlay">
            <button id="recenter-btn" class="mf-btn mf-btn-primary" style="padding: 8px 12px; margin-right: 12px; display: none;" title="Recenter to my location">
                <i class="bi bi-crosshair"></i>
            </button>
            <div class="mf-pulse-dot"></div>
            <span id="location-status" style="font-weight: 500;">Locating pharmacies near you...</span>
        </div>
    </section>

    <!-- Main Content -->
    <div class="mf-container">
        <h2 class="mf-section-title">Available in a 10km Radius</h2>
        
        <div id="nearby-meds-grid" class="mf-grid">
            <!-- Populated via Javascript -->
            <p style="grid-column: 1 / -1; color: var(--clr-text-muted);">Please allow location access to see nearby medications.</p>
        </div>
    </div>

</main>

<th:block layout:fragment="scripts">
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Initialize Map (Default: Bucharest Center)
            const map = L.map('home-map', { zoomControl: false }).setView([44.4268, 26.1025], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap, © CartoDB'
            }).addTo(map);

            const statusEl = document.getElementById('location-status');
            const gridEl = document.getElementById('nearby-meds-grid');
            
            // 2. Custom Icon for Pharmacies
            const pharmaIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style='background-color:#00F0FF;width:12px;height:12px;border-radius:50%;border:2px solid #0A0A0B;box-shadow:0 0 10px rgba(0,240,255,0.8); transition: all 0.3s ease;'></div>`,
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });

            const pharmaIconHover = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style='background-color:#FF007A;width:20px;height:20px;border-radius:50%;border:2px solid #0A0A0B;box-shadow:0 0 20px rgba(255,0,122,1); transition: all 0.3s ease;'></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            // 3. Geolocation
            let userLat = 44.4268;
            let userLng = 26.1025;
            const recenterBtn = document.getElementById('recenter-btn');

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        
                        map.setView([userLat, userLng], 14);
                        statusEl.innerText = "Showing pharmacies near your exact location";
                        recenterBtn.style.display = 'block';
                        
                        // User marker
                        L.circleMarker([userLat, userLng], {
                            radius: 8,
                            fillColor: "var(--clr-secondary)",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map).bindPopup("You are here");

                        fetchNearbyStocks(userLat, userLng);
                    },
                    error => {
                        console.warn("Geolocation denied or failed", error);
                        statusEl.innerText = "Approximate location used (Bucharest Default)";
                        // Fallback to default
                        fetchNearbyStocks(userLat, userLng);
                    }
                );
            } else {
                statusEl.innerText = "Approximate location used (Bucharest Default)";
                fetchNearbyStocks(userLat, userLng);
            }

            recenterBtn.addEventListener('click', () => {
                map.setView([userLat, userLng], 14);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            if (searchQuery) {
                const searchInput = document.getElementById('global-search');
                if (searchInput) searchInput.value = searchQuery;
            }

            function fetchNearbyStocks(lat, lng) {
                fetch(`/api/nearby?lat=${lat}&lng=${lng}&radiusKm=10.0`)
                    .then(res => res.json())
                    .then(data => {
                        gridEl.innerHTML = ''; // clear loading
                        
                        let filteredData = data;
                        if (searchQuery) {
                            const sq = searchQuery.toLowerCase();
                            filteredData = data.filter(stock => {
                                const med = stock.medication;
                                return med.name.toLowerCase().includes(sq) ||
                                       (med.activeSubstance && med.activeSubstance.toLowerCase().includes(sq)) ||
                                       med.ean.toLowerCase().includes(sq);
                            });
                        }

                        if (filteredData.length === 0) {
                            gridEl.innerHTML = `<p>No medications found within 10km${searchQuery ? ' matching "' + searchQuery + '"' : ''}.</p>`;
                            return;
                        }

                        // Use a Map to deduplicate by EAN (show 1 card per medication)
                        const medsMap = new Map();
                        const markersByEan = {};
                        
                        // Keep track of locations to avoid duplicate markers on map (since one pharmacy can have multiple meds)
                        const locationMarkers = new Map(); 

                        filteredData.forEach(stock => {
                            const ean = stock.medication.ean;
                            const loc = stock.location;
                            
                            // Add marker to map (one per pharmacy)
                            let marker;
                            if (loc.latitude && loc.longitude) {
                                if (!locationMarkers.has(loc.id)) {
                                    marker = L.marker([loc.latitude, loc.longitude], {icon: pharmaIcon})
                                     .addTo(map)
                                     .bindPopup(`<b>${loc.pharmacyName || loc.name}</b><br>${loc.address}`);
                                    locationMarkers.set(loc.id, marker);
                                } else {
                                    marker = locationMarkers.get(loc.id);
                                }
                                
                                if (!markersByEan[ean]) markersByEan[ean] = [];
                                // Only push if not already pushed for this EAN (just in case)
                                if (!markersByEan[ean].includes(marker)) {
                                    markersByEan[ean].push(marker);
                                }
                            }

                            // Deduplicate for grid
                            if (!medsMap.has(ean)) {
                                medsMap.set(ean, {
                                    medication: stock.medication,
                                    minPrice: stock.price,
                                    locationsCount: 1
                                });
                            } else {
                                const entry = medsMap.get(ean);
                                entry.locationsCount++;
                                if (stock.price < entry.minPrice) {
                                    entry.minPrice = stock.price;
                                }
                            }
                        });

                        // Render Cards
                        medsMap.forEach((entry, ean) => {
                            const med = entry.medication;
                            const card = document.createElement('a');
                            card.href = `/m/${ean}`;
                            card.className = 'mf-glass-card mf-med-card';
                            
                            card.innerHTML = `
                                <div class="mf-med-header">
                                    <div>
                                        <h3 class="mf-med-name">${med.name}</h3>
                                        <div class="mf-med-sub">${med.activeSubstance || 'Unknown'} • ${med.dosage || ''}</div>
                                    </div>
                                    ${med.prescriptionRequired ? '<i class="bi bi-file-medical" style="color:var(--clr-text-muted);" title="Prescription Required"></i>' : ''}
                                </div>
                                <div class="mf-med-price">from ${entry.minPrice} RON</div>
                                <div class="mf-med-footer">
                                    <span>${entry.locationsCount} pharmacies nearby</span>
                                    <span>${med.form}</span>
                                </div>
                            `;
                            
                            // Add Hover listeners
                            card.addEventListener('mouseenter', () => {
                                if (markersByEan[ean]) {
                                    markersByEan[ean].forEach(m => {
                                        m.setIcon(pharmaIconHover);
                                        m.setZIndexOffset(1000);
                                    });
                                }
                            });
                            card.addEventListener('mouseleave', () => {
                                if (markersByEan[ean]) {
                                    markersByEan[ean].forEach(m => {
                                        m.setIcon(pharmaIcon);
                                        m.setZIndexOffset(0);
                                    });
                                }
                            });
                            
                            gridEl.appendChild(card);
                        });
                    });
            }
        });
    </script>
</th:block>

</body>
</html>
