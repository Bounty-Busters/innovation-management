<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <header th:fragment="header" class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3" th:href="@{/admin/dashboard}">
            <i class="bi bi-heart-pulse-fill text-danger me-2"></i> MedFinder
        </a>
        <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="navbar-nav w-100 d-flex flex-row justify-content-end px-3 py-2 text-light align-items-center">
            <div class="nav-item text-nowrap me-3" th:if="${currentUser != null}">
                <i class="bi bi-person-circle me-1"></i>
                <span th:text="${currentUser.firstName + ' ' + currentUser.lastName}">User Name</span>
                <span class="badge bg-secondary ms-1" th:text="${currentRole}">ROLE</span>
            </div>
            <div class="nav-item text-nowrap">
                <form th:action="@{/auth/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="bi bi-box-arrow-right"></i> Sign out
                    </button>
                </form>
            </div>
        </div>
    </header>
</body>
</html>
