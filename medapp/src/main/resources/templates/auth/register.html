<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFinder - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        body {
            padding-top: 40px;
            padding-bottom: 40px;
        }
        .form-register {
            max-width: 600px;
            padding: 15px;
            margin: auto;
        }
    </style>
</head>
<body>

<main class="form-register w-100 m-auto">
    <div class="card shadow-lg border-0" style="background: rgba(36, 40, 59, 0.95); backdrop-filter: blur(10px);">
        <div class="card-body p-4 text-start">
            <div class="text-center">
                <h1 class="h3 mb-3 fw-bold text-white">
                    <i class="bi bi-heart-pulse-fill text-danger"></i> MedFinder
                </h1>
                <h2 class="h5 mb-4 fw-normal">Create an account</h2>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}">
            </div>

            <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" th:field="*{firstName}" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" th:field="*{lastName}" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" th:field="*{phone}" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" th:field="*{password}" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" th:field="*{confirmPassword}" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="role" class="form-label">I want to register as:</label>
                    <select class="form-select" th:field="*{role}" id="roleSelect" th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
                        <option value="CLIENT">Client (Storefront User)</option>
                        <option value="PHARM_OWNER">Pharmacy Owner</option>
                        <option value="PHARMACIST">Pharmacist</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                </div>

                <div class="mb-3" id="companyNameDiv">
                    <label for="companyName" class="form-label">Company Name</label>
                    <input type="text" class="form-control" th:field="*{companyName}" th:classappend="${#fields.hasErrors('companyName')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></div>
                </div>

                <button class="w-100 btn btn-lg btn-primary mt-3" type="submit">Register</button>
            </form>
            
            <div class="text-center mt-3">
                <p class="text-muted">Already have an account? <a th:href="@{/auth/login}">Sign in here</a></p>
            </div>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const roleSelect = document.getElementById('roleSelect');
        const companyNameDiv = document.getElementById('companyNameDiv');
        
        function toggleCompany() {
            if (roleSelect.value === 'PHARM_OWNER') {
                companyNameDiv.style.display = 'block';
            } else {
                companyNameDiv.style.display = 'none';
            }
        }
        
        roleSelect.addEventListener('change', toggleCompany);
        toggleCompany(); // Initial state
        
        // Frontend Validation for @medfinder domain
        const form = document.querySelector('form');
        const emailInput = document.getElementById('email');
        
        form.addEventListener('submit', function(e) {
            const role = roleSelect.value;
            const email = emailInput.value.toLowerCase();
            
            if (role !== 'CLIENT' && !email.endsWith('@medfinder.ro')) {
                e.preventDefault();
                alert('Only @medfinder.ro emails can register as Pharmacy Owner or Pharmacist.');
            }
        });
    });
</script>
</body>
</html>
