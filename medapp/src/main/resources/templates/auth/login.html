<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedFinder - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
            height: 100vh;
        }
        .form-signin {
            max-width: 400px;
            padding: 15px;
            margin: auto;
        }
    </style>
</head>
<body class="text-center">

<main class="form-signin w-100 m-auto">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h3 mb-3 fw-normal">
                <i class="bi bi-heart-pulse-fill text-danger"></i> MedFinder
            </h1>
            <h2 class="h5 mb-4 fw-normal">Please sign in</h2>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Invalid username and password.
            </div>
            
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                You have been logged out.
            </div>
            
            <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}">
            </div>

            <form th:action="@{/auth/login}" method="post">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="username" name="username" placeholder="name@example.com" required autofocus>
                    <label for="username">Email address</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    <label for="password">Password</label>
                </div>

                <button class="w-100 btn btn-lg btn-primary mb-3" type="submit">Sign in</button>
            </form>
            
            <p class="text-muted">Don't have an account? <a th:href="@{/auth/register}">Register here</a></p>
        </div>
    </div>
</main>

</body>
</html>
