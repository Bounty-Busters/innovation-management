spring.application.name=medapp

# ── DataSource — H2 in-memory (development) ──────────────────
spring.datasource.url=jdbc:h2:mem:medfinder;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── H2 Console (dev only) ───────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Thymeleaf ────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Mailpit / SMTP ───────────────────────────────────────────
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
